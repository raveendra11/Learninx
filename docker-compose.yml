services:
  learninx:
    build: .
    image: learninx:latest
    container_name: learninx
    restart: unless-stopped
    ports:
      # Map container port 3000 to host port 3001 so the local `npm run
      # dev` server (which already uses host port 3000) can keep running.
      # To reclaim port 3000 exclusively, stop the dev server first.
      - "3001:3000"
    environment:
      # Optional: a stable cookie-signing secret. Pick a long random string
      # in production. If unset, the server uses a per-process key (which
      # means progress cookies reset on every container restart).
      - LEARNINX_SECRET=
      - NODE_ENV=production
